# Koyeb configuration for piRho Backend
# This file is optional - Koyeb can also be configured via the dashboard

name: pirho-backend
type: web

# Build configuration
build:
  type: dockerfile
  dockerfile: Dockerfile

# Runtime configuration
run:
  command: uvicorn app.main:app --host 0.0.0.0 --port 8000

# Port configuration
ports:
  - port: 8000
    protocol: http

# Health check
healthcheck:
  path: /health
  interval: 30
  timeout: 10
  initial_delay: 40

# Scaling (optional - can be configured in dashboard)
# instances:
#   min: 1
#   max: 3

# Environment variables should be set in Koyeb dashboard
# See KOYEB_DEPLOYMENT.md for details


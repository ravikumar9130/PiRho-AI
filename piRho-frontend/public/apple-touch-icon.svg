    </filter>
  </defs>
  <rect width="180" height="180" rx="36" fill="#0f172a" stroke="url(#appleGradient)" stroke-width="3"/>
  <text x="90" y="115" text-anchor="middle" fill="#00FFFF" font-size="72" font-weight="bold" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" filter="url(#glow)">πρ</text>
